<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Ford</title>

    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="/img/ford-96.png" alt="Logo Ford">
        </div>

        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Lançamento</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <main>

        <section class="lancamento">
            <h2>Lançamento</h2>

            <img src="/img/imagem_1.jpg" alt="Novo Produto">

            <p>
                Conheça o novo modelo com tecnologia avançada, 
                design moderno e alto desempenho. Ideal para quem busca 
                conforto, potência e inovação.
            </p>
        </section>

        <section class="produtos">
            <img src="/img/XL Cabine.jpg" alt="">
            <img src="/img/xls 2.2 diesel.jpg" alt="">
            <img src="/img/storm.jpg" alt="">
        </section>

    </main>

    <footer>
        <div class="redes">
            <p class="redesSociais">Redes Sociais</p>
            <img src="img/facebook-50.png" alt="">
            <img src="/img/instagram-logo-50.png" alt="">
            <img src="/img/youtube-squared-50.png" alt="">
        </div>
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lançamento</title>

    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/lancamento.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

     <header>
        <div class="logo">
            <img src="/img/ford-96.png" alt="Logo Ford">
        </div>

        <nav class="menu">
            <a href="/index.html">Home</a>
            <a href="/Lancamento.html">Lançamento</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <main>

    <section class="video">
       <iframe 
            src="https://www.youtube.com/embed/vQsryuNmsL0"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </section>

    <section class="cards">

        <div class="card">
            <img src="/img/XL Cabine.png" alt="">
            <label>
                <input type="checkbox" checked>
                XL Cabine 2.2 Diesel
            </label>
        </div>

        <div class="card">
            <img src="/img/xls_2.2_diesel.png" alt="">
            <label>
                <input type="checkbox">
                XLS 2.2 Diesel AT
            </label>
        </div>

        <div class="card">
            <img src="/img/storm.png" alt="">
            <label>
                <input type="checkbox">
                Storm 3.2 Diesel 4x4
            </label>
        </div>

    </section>

    <div class="comparar-container">
        <button>Comparar Veículos</button>
    </div>

</main>

<footer>

    <div class="redes-container">
        <p class="redeSociais">Redes Sociais</p>
        <section class="redes">
            <img src="img/facebook-50.png" alt="">
            <img src="/img/instagram-logo-50.png" alt="">
            <img src="/img/youtube-squared-50.png" alt="">
        </section>
    </div>

    <p class="texto">
        © 2025 Ford Motor Company - Todos os direitos reservados Política de Privacidade Direitos do Titular
    </p>

    <img class="logo2" src="/img/ford-96.png" alt="">

</footer>

</body>
</html>
